<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Verify Account — FIRSTTRADES</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="theme.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WR70LQ6B2D"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WR70LQ6B2D');</script>
</head>
<body>
<div class="pg-bg"><canvas id="pgCanvas"></canvas><div class="pg-grid"></div><div class="pg-orb pg-orb-1"></div><div class="pg-orb pg-orb-2"></div></div>

<div class="pg-topbar">
    <a href="index.html" class="pg-logo">FIRST<span>TRADES</span></a>
    <a href="step2.html" class="pg-topbar-link">← Back</a>
</div>

<div class="pg-wrap">
    <div class="pg-card">
        <div class="pg-steps">
            <div class="pg-step-dot done">✓</div><div class="pg-step-line done"></div>
            <div class="pg-step-dot done">✓</div><div class="pg-step-line done"></div>
            <div class="pg-step-dot done">✓</div><div class="pg-step-line done"></div>
            <div class="pg-step-dot active">4</div><div class="pg-step-line"></div>
            <div class="pg-step-dot">5</div>
        </div>

        <div class="pg-card-icon">✉️</div>
        <h2>Verify Your Account</h2>
        <p class="pg-sub">A 6-digit code has been sent to your email</p>
        <div class="pg-divider"></div>

        <div class="pg-email-box">
            <strong id="userEmail">Loading...</strong>
            <a href="#" onclick="showChangeEmail();return false;">Change email address</a>
        </div>

        <div id="changeEmailPanel" style="display:none;margin-bottom:1.25rem;">
            <div class="pg-field">
                <label>New Email Address</label>
                <input type="email" id="newEmailInput" placeholder="your@email.com">
            </div>
            <button class="pg-btn pg-btn-gold" onclick="updateEmail()">Update & Resend Code</button>
        </div>

        <div class="pg-code-row">
            <input type="text" class="pg-code-input" maxlength="1" id="c1">
            <input type="text" class="pg-code-input" maxlength="1" id="c2">
            <input type="text" class="pg-code-input" maxlength="1" id="c3">
            <input type="text" class="pg-code-input" maxlength="1" id="c4">
            <input type="text" class="pg-code-input" maxlength="1" id="c5">
            <input type="text" class="pg-code-input" maxlength="1" id="c6">
        </div>

        <div style="text-align:center;margin-bottom:1.5rem;">
            <div class="pg-timer" id="timer">Resend code in 05:00</div>
            <a href="#" class="pg-resend disabled" id="resendLink" onclick="resendCode();return false;">Resend Code</a>
        </div>

        <div class="pg-alert pg-alert-err" id="errMsg">Invalid code. Please try again.</div>
        <div class="pg-alert pg-alert-ok" id="okMsg">✓ Verified! Redirecting...</div>

        <button class="pg-btn pg-btn-gold" id="verifyBtn" onclick="verifyCode()" disabled>Verify Account</button>
    </div>
</div>

<script>
(function(){var c=document.getElementById('pgCanvas'),ctx=c.getContext('2d'),W,H,pts=[];function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);for(var i=0;i<70;i++)pts.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,r:Math.random()*1.1+.3,a:Math.random()*.4+.1,g:Math.random()>.6});function draw(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){p.x=(p.x+p.vx+1)%1;p.y=(p.y+p.vy+1)%1;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);ctx.fillStyle=p.g?'rgba(201,168,76,'+p.a+')':'rgba(255,255,255,'+(p.a*.4)+')';ctx.fill();});requestAnimationFrame(draw);}draw();})();

var verificationCode = '', countdownTime = 300, countdownInterval;

function generateCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }

function showChangeEmail() {
    var p = document.getElementById('changeEmailPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function updateEmail() {
    var e = document.getElementById('newEmailInput').value.trim();
    if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) return;
    var ud = JSON.parse(localStorage.getItem('userData')||'{}');
    ud.email = e; localStorage.setItem('userData', JSON.stringify(ud));
    document.getElementById('userEmail').textContent = e;
    document.getElementById('changeEmailPanel').style.display = 'none';
    document.querySelectorAll('.pg-code-input').forEach(function(i){i.value='';i.classList.remove('filled');});
    document.getElementById('verifyBtn').disabled = true;
    sendCode(); startCountdown();
}

function sendCode() {
    var ud = JSON.parse(localStorage.getItem('userData')||'{}');
    if (!ud.email) { window.location.href='step2.html'; return; }
    document.getElementById('userEmail').textContent = ud.email;
    verificationCode = generateCode();
    emailjs.init('87Kz9Kn2GUbp7Vqs2');
    emailjs.send('service_1oywrcn','template_tdlr0oe',{
        to_name:  ud.fullName||'User',
        to_email: ud.email,
        code:     verificationCode
    }).then(function(){console.log('Code sent');},function(e){console.error('EmailJS error',e);});
}

function startCountdown() {
    var timerEl=document.getElementById('timer'), resendBtn=document.getElementById('resendLink');
    countdownTime=300; clearInterval(countdownInterval);
    resendBtn.classList.add('disabled'); timerEl.classList.remove('expired');
    countdownInterval = setInterval(function(){
        var m=Math.floor(countdownTime/60), s=countdownTime%60;
        timerEl.textContent='Resend code in '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        countdownTime--;
        if (countdownTime<0) { clearInterval(countdownInterval); timerEl.textContent='You can now resend the code'; timerEl.classList.add('expired'); resendBtn.classList.remove('disabled'); }
    },1000);
}

function resendCode() {
    document.querySelectorAll('.pg-code-input').forEach(function(i){i.value='';i.classList.remove('filled');});
    document.getElementById('verifyBtn').disabled=true;
    document.getElementById('errMsg').style.display='none';
    sendCode(); startCountdown();
}

function verifyCode() {
    var inputs=document.querySelectorAll('.pg-code-input');
    var entered=Array.from(inputs).map(function(i){return i.value;}).join('');
    document.getElementById('errMsg').style.display='none';
    document.getElementById('okMsg').style.display='none';
    if (entered===verificationCode) {
        document.getElementById('okMsg').style.display='block';
        document.getElementById('verifyBtn').disabled=true;
        var ud=JSON.parse(localStorage.getItem('userData')||'{}');
        ud.verified=true; localStorage.setItem('userData',JSON.stringify(ud));
        var allUsers=JSON.parse(localStorage.getItem('allUsers')||'[]');
        var ui=allUsers.findIndex(function(u){return u.email===ud.email;});
        if (ui>=0){allUsers[ui].verified=true;localStorage.setItem('allUsers',JSON.stringify(allUsers));}
        setTimeout(function(){window.location.href='step6.html';},1500);
    } else {
        document.getElementById('errMsg').style.display='block';
        inputs.forEach(function(i){i.style.animation='shake 0.35s ease';setTimeout(function(){i.style.animation='';},400);});
    }
}

document.addEventListener('DOMContentLoaded', function() {
    sendCode(); startCountdown();
    var inputs=document.querySelectorAll('.pg-code-input');
    inputs.forEach(function(input,idx){
        input.addEventListener('input',function(){
            this.value=this.value.replace(/[^0-9]/g,'');
            this.classList.toggle('filled',!!this.value);
            if (this.value && idx<inputs.length-1) inputs[idx+1].focus();
            document.getElementById('verifyBtn').disabled=!Array.from(inputs).every(function(i){return i.value;});
        });
        input.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&idx>0)inputs[idx-1].focus();});
        input.addEventListener('paste',function(e){
            e.preventDefault();
            var d=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
            d.split('').forEach(function(ch,i){if(inputs[i]){inputs[i].value=ch;inputs[i].classList.add('filled');}});
            setTimeout(function(){document.getElementById('verifyBtn').disabled=!Array.from(inputs).every(function(i){return i.value;});},100);
        });
    });
});
</script>
<style>@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}</style>
</body>
</html>
