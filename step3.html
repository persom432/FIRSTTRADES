<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account - FIRSTTRADES</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .verification-form {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 120px 20px 80px;
        }

        .verification-container {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 3rem;
            text-align: center;
        }

        .verification-header {
            margin-bottom: 2rem;
        }

        .verification-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .verification-header p {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .email-display {
            background: rgba(102, 126, 234, 0.1);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .email-display strong {
            color: #667eea;
            font-weight: 600;
        }

        .verification-input {
            margin-bottom: 2rem;
        }

        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .code-input {
            width: 50px;
            height: 60px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
        }

        .code-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
            transform: scale(1.05);
        }

        .code-input.filled {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .timer {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .timer.expired {
            color: #e74c3c;
        }

        .resend-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .resend-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #ccc;
            cursor: not-allowed;
            pointer-events: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e9ecef;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .step-circle.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: #e9ecef;
            margin: 0 0.5rem;
        }

        .step-line.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @media (max-width: 768px) {
            .verification-container {
                padding: 2rem 1.5rem;
            }

            .verification-header h1 {
                font-size: 1.8rem;
            }

            .code-inputs {
                gap: 0.25rem;
            }

            .code-input {
                width: 45px;
                height: 55px;
                font-size: 1.5rem;
            }

        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">FIRSTTRADES</div>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#stats">Statistics</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="verification-form">
        <div class="verification-container">
            <div class="progress-indicator">
                <div class="progress-step">
                    <div class="step-circle completed">1</div>
                </div>
                <div class="step-line completed"></div>
                <div class="progress-step">
                    <div class="step-circle completed">2</div>
                </div>
                <div class="step-line completed"></div>
                <div class="progress-step">
                    <div class="step-circle completed">3</div>
                </div>
                <div class="step-line completed"></div>
                <div class="progress-step">
                    <div class="step-circle active">4</div>
                </div>
                <div class="step-line"></div>
                <div class="progress-step">
                    <div class="step-circle">5</div>
                </div>
            </div>

            <div class="verification-header">
                <h1>Verify Your Account</h1>
                <p>A 6-digit verification code has been sent to your email</p>
            </div>

            <div class="email-display">
                <strong id="userEmail">Loading...</strong>
            </div>

            <div class="verification-input">
                <div class="code-inputs">
                    <input type="text" class="code-input" maxlength="1" id="code1">
                    <input type="text" class="code-input" maxlength="1" id="code2">
                    <input type="text" class="code-input" maxlength="1" id="code3">
                    <input type="text" class="code-input" maxlength="1" id="code4">
                    <input type="text" class="code-input" maxlength="1" id="code5">
                    <input type="text" class="code-input" maxlength="1" id="code6">
                </div>

                <div class="timer" id="timer">Resend code in 05:00</div>

                <a href="#" class="resend-link disabled" id="resendLink" onclick="resendCode()">Resend Code</a>
            </div>

            <div class="error-message" id="errorMessage">Invalid verification code. Please try again.</div>
            <div class="success-message" id="successMessage">Verification successful! Redirecting...</div>

            <div style="margin-top: 2rem;">
                <button class="btn" id="verifyBtn" onclick="verifyCode()" disabled>Verify</button>
            </div>
        </div>
    </section>

    <script>
        // EmailJS config
        emailjs.init('0J1wL_xAXvlRU7WaV');

        var verificationCode = '';
        var countdownTime = 300;
        var countdownInterval;

        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function sendCode() {
            var userData = JSON.parse(localStorage.getItem('userData') || '{}');
            var userEmail = userData.email;
            var userName = userData.fullName || 'User';

            if (!userEmail) {
                alert('No email found. Please register first.');
                window.location.href = 'step2.html';
                return;
            }

            document.getElementById('userEmail').textContent = userEmail;
            verificationCode = generateCode();

            // Send via EmailJS
            emailjs.send('service_jjdb6rb', 'template_rjcvhus', {
                to_name:  userName,
                to_email: userEmail,
                code:     verificationCode
            }).then(function() {
                console.log('Code sent successfully');
            }, function(error) {
                console.error('EmailJS error:', error);
                alert('Failed to send code. Please try again.');
            });
        }

        function startCountdown() {
            var timerEl   = document.getElementById('timer');
            var resendBtn = document.getElementById('resendLink');
            countdownTime = 300;
            clearInterval(countdownInterval);
            resendBtn.classList.add('disabled');
            timerEl.classList.remove('expired');

            countdownInterval = setInterval(function() {
                var m = Math.floor(countdownTime / 60);
                var s = countdownTime % 60;
                timerEl.textContent = 'Resend code in ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
                countdownTime--;
                if (countdownTime < 0) {
                    clearInterval(countdownInterval);
                    timerEl.textContent = 'You can now resend the code';
                    timerEl.classList.add('expired');
                    resendBtn.classList.remove('disabled');
                }
            }, 1000);
        }

        function resendCode() {
            document.querySelectorAll('.code-input').forEach(function(i) { i.value = ''; i.classList.remove('filled'); });
            document.getElementById('verifyBtn').disabled = true;
            document.getElementById('errorMessage').style.display = 'none';
            sendCode();
            startCountdown();
            alert('A new code has been sent to your email.');
        }

        function verifyCode() {
            var inputs = document.querySelectorAll('.code-input');
            var entered = Array.from(inputs).map(function(i) { return i.value; }).join('');

            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            if (entered === verificationCode) {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('verifyBtn').disabled = true;
                var userData = JSON.parse(localStorage.getItem('userData') || '{}');
                userData.verified = true;
                localStorage.setItem('userData', JSON.stringify(userData));
                setTimeout(function() {
                    window.location.href = 'step6.html';
                }, 1500);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                inputs.forEach(function(input) {
                    input.style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(function() { input.style.animation = ''; }, 500);
                });
            }
        }

        // Setup inputs
        document.addEventListener('DOMContentLoaded', function() {
            sendCode();
            startCountdown();

            var inputs = document.querySelectorAll('.code-input');
            inputs.forEach(function(input, index) {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    this.classList.toggle('filled', !!this.value);
                    if (this.value && index < inputs.length - 1) inputs[index + 1].focus();
                    document.getElementById('verifyBtn').disabled = !Array.from(inputs).every(function(i) { return i.value; });
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) inputs[index - 1].focus();
                });
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    var digits = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
                    digits.split('').forEach(function(d, i) { if (inputs[i]) { inputs[i].value = d; inputs[i].classList.add('filled'); } });
                    setTimeout(function() {
                        document.getElementById('verifyBtn').disabled = !Array.from(inputs).every(function(i) { return i.value; });
                    }, 100);
                });
            });
        });

        var style = document.createElement('style');
        style.textContent = '@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }';
        document.head.appendChild(style);
    </script>
</body>
</html>
