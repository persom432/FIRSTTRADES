<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Create Account — FIRSTTRADES</title>
    <link rel="stylesheet" href="theme.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WR70LQ6B2D"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WR70LQ6B2D');</script>
</head>
<body>
<div class="pg-bg"><canvas id="pgCanvas"></canvas><div class="pg-grid"></div><div class="pg-orb pg-orb-1"></div><div class="pg-orb pg-orb-2"></div></div>

<div class="pg-topbar">
    <a href="index.html" class="pg-logo">FIRST<span>TRADES</span></a>
    <a href="login.html" class="pg-topbar-link">Sign in →</a>
</div>

<div class="pg-wrap">
    <div class="pg-card pg-card-wide">
        <div class="pg-steps">
            <div class="pg-step-dot done">✓</div><div class="pg-step-line done"></div>
            <div class="pg-step-dot active">2</div><div class="pg-step-line"></div>
            <div class="pg-step-dot">3</div><div class="pg-step-line"></div>
            <div class="pg-step-dot">4</div><div class="pg-step-line"></div>
            <div class="pg-step-dot">5</div>
        </div>

        <div class="pg-card-icon">📋</div>
        <h2>Create Your Account</h2>
        <p class="pg-sub">Fill in your details to get started — takes less than 2 minutes</p>
        <div class="pg-divider"></div>

        <div id="accountBadge" class="pg-badge" style="display:none;margin:0 auto 1.25rem;width:fit-content;"></div>

        <form id="regForm">
            <div class="pg-field">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your full name" required>
                <div class="pg-err" id="nameErr">Please enter your full name</div>
            </div>
            <div class="pg-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
                <div class="pg-err" id="emailErr">Please enter a valid email</div>
            </div>
            <div class="pg-field">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+1 000 000 0000" required>
                <div class="pg-err" id="phoneErr">Please enter a valid phone number</div>
            </div>
            <div class="pg-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
                <div class="pg-strength" id="strength"></div>
                <div class="pg-err" id="passErr">Password must be at least 8 characters</div>
            </div>
            <div class="pg-field">
                <label>Country</label>
                <select id="country" required>
                    <option value="">Select your country</option>
                    <option value="US">United States</option><option value="CA">Canada</option><option value="GB">United Kingdom</option><option value="AU">Australia</option><option value="DE">Germany</option><option value="FR">France</option><option value="JP">Japan</option><option value="CN">China</option><option value="IN">India</option><option value="BR">Brazil</option><option value="MX">Mexico</option><option value="SG">Singapore</option><option value="HK">Hong Kong</option><option value="KR">South Korea</option><option value="ZA">South Africa</option><option value="NG">Nigeria</option><option value="EG">Egypt</option><option value="TR">Turkey</option><option value="RU">Russia</option><option value="IT">Italy</option><option value="ES">Spain</option><option value="NL">Netherlands</option><option value="SE">Sweden</option><option value="NO">Norway</option><option value="DK">Denmark</option><option value="FI">Finland</option><option value="PL">Poland</option><option value="CZ">Czech Republic</option><option value="AT">Austria</option><option value="CH">Switzerland</option><option value="BE">Belgium</option><option value="PT">Portugal</option><option value="GR">Greece</option><option value="HU">Hungary</option><option value="RO">Romania</option><option value="SK">Slovakia</option><option value="SI">Slovenia</option><option value="HR">Croatia</option><option value="RS">Serbia</option><option value="BG">Bulgaria</option><option value="UA">Ukraine</option><option value="GE">Georgia</option><option value="AM">Armenia</option><option value="AZ">Azerbaijan</option><option value="KZ">Kazakhstan</option><option value="UZ">Uzbekistan</option><option value="VN">Vietnam</option><option value="TH">Thailand</option><option value="MY">Malaysia</option><option value="ID">Indonesia</option><option value="PH">Philippines</option><option value="PK">Pakistan</option><option value="BD">Bangladesh</option><option value="LK">Sri Lanka</option><option value="NP">Nepal</option><option value="MM">Myanmar</option><option value="KH">Cambodia</option><option value="NZ">New Zealand</option><option value="FJ">Fiji</option><option value="AR">Argentina</option><option value="CL">Chile</option><option value="CO">Colombia</option><option value="PE">Peru</option><option value="VE">Venezuela</option><option value="EC">Ecuador</option><option value="BO">Bolivia</option><option value="PY">Paraguay</option><option value="UY">Uruguay</option><option value="PA">Panama</option><option value="CR">Costa Rica</option><option value="GT">Guatemala</option><option value="JM">Jamaica</option><option value="DO">Dominican Republic</option><option value="CU">Cuba</option><option value="BS">Bahamas</option><option value="KY">Cayman Islands</option><option value="IS">Iceland</option><option value="EE">Estonia</option><option value="LV">Latvia</option><option value="LT">Lithuania</option><option value="MT">Malta</option><option value="CY">Cyprus</option><option value="LU">Luxembourg</option><option value="MC">Monaco</option><option value="AD">Andorra</option><option value="SM">San Marino</option><option value="LI">Liechtenstein</option><option value="IE">Ireland</option><option value="IL">Israel</option><option value="LB">Lebanon</option><option value="JO">Jordan</option><option value="IQ">Iraq</option><option value="KW">Kuwait</option><option value="SA">Saudi Arabia</option><option value="BH">Bahrain</option><option value="QA">Qatar</option><option value="AE">United Arab Emirates</option><option value="OM">Oman</option><option value="YE">Yemen</option><option value="IR">Iran</option><option value="AF">Afghanistan</option><option value="MV">Maldives</option><option value="TT">Trinidad and Tobago</option><option value="BB">Barbados</option><option value="LC">Saint Lucia</option><option value="GD">Grenada</option><option value="AG">Antigua and Barbuda</option><option value="KN">Saint Kitts and Nevis</option><option value="VG">British Virgin Islands</option>
                </select>
                <div class="pg-err" id="countryErr">Please select your country</div>
            </div>

            <div class="pg-terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I accept the <a href="#" onclick="alert('By using FIRSTTRADES you agree to our trading policies and risk disclosures.');return false;">Terms & Conditions</a> and <a href="#" onclick="alert('We protect your personal data and never share it with third parties.');return false;">Privacy Policy</a></label>
            </div>

            <div class="pg-btn-row">
                <button type="button" class="pg-btn pg-btn-ghost" onclick="window.location.href='getstarted.html'">← Back</button>
                <button type="submit" class="pg-btn pg-btn-gold">Create Account →</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({ apiKey:'AIzaSyBR1-caoYvx349eM5SNbGBv48dKkTo1SAg', authDomain:'firsyttrades.firebaseapp.com', projectId:'firsyttrades', storageBucket:'firsyttrades.firebasestorage.app', messagingSenderId:'682136069776', appId:'1:682136069776:web:1418609d07c33803341a15' });
const db = getFirestore(app);

// Particle background
(function(){var c=document.getElementById('pgCanvas'),ctx=c.getContext('2d'),W,H,pts=[];function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);for(var i=0;i<70;i++)pts.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,r:Math.random()*1.1+.3,a:Math.random()*.4+.1,g:Math.random()>.6});function draw(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){p.x=(p.x+p.vx+1)%1;p.y=(p.y+p.vy+1)%1;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);ctx.fillStyle=p.g?'rgba(201,168,76,'+p.a+')':'rgba(255,255,255,'+(p.a*.4)+')';ctx.fill();});requestAnimationFrame(draw);}draw();})();

// Account badge
var t = localStorage.getItem('selectedAccountType');
if (t) { var b = document.getElementById('accountBadge'); b.textContent = t.charAt(0).toUpperCase()+t.slice(1)+' Account'; b.style.display='flex'; }

// Password strength
document.getElementById('password').addEventListener('input', function() {
    var p = this.value, s = document.getElementById('strength'), str = 0;
    if (!p) { s.style.display='none'; return; }
    if (p.length>=8) str++; if (/[A-Z]/.test(p)) str++; if (/[a-z]/.test(p)) str++; if (/[0-9]/.test(p)) str++; if (/[^A-Za-z0-9]/.test(p)) str++;
    s.style.display='block';
    if (str<=2) { s.textContent='Weak password'; s.className='pg-strength weak'; }
    else if (str<=3) { s.textContent='Medium password'; s.className='pg-strength medium'; }
    else { s.textContent='Strong password'; s.className='pg-strength strong'; }
});

// Form submit
document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.querySelectorAll('.pg-err').forEach(function(el){el.style.display='none';});
    var ok = true;
    var fullName = document.getElementById('fullName').value.trim();
    var email    = document.getElementById('email').value.trim().toLowerCase();
    var phone    = document.getElementById('phone').value.trim();
    var password = document.getElementById('password').value;
    var country  = document.getElementById('country').value;
    var terms    = document.getElementById('terms').checked;
    if (fullName.length < 2)  { document.getElementById('nameErr').style.display='block'; ok=false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailErr').style.display='block'; ok=false; }
    if (phone.length < 10)    { document.getElementById('phoneErr').style.display='block'; ok=false; }
    if (password.length < 8)  { document.getElementById('passErr').style.display='block'; ok=false; }
    if (!country)             { document.getElementById('countryErr').style.display='block'; ok=false; }
    if (!terms || !ok) return;

    var submitBtn = document.querySelector('.pg-btn-gold');
    submitBtn.textContent = 'Creating account...';
    submitBtn.disabled = true;

    var userData = {
        fullName,
        email,
        phone,
        password,
        country,
        accountType: localStorage.getItem('selectedAccountType') || 'individual',
        registrationDate: new Date().toISOString(),
        balance: 500,
        bonusBalance: 500,
        signUpBonusLabel: 'Sign-Up Bonus',
        total_deposit: 0,
        allow_withdrawal: false,
        bonusPopupSeen: false
    };

    try {
        var existing = await getDoc(doc(db, 'users', email));
        if (existing.exists()) {
            document.getElementById('emailErr').textContent = 'An account with this email already exists.';
            document.getElementById('emailErr').style.display='block';
            submitBtn.textContent = 'Create Account →'; submitBtn.disabled = false;
            return;
        }
        await setDoc(doc(db, 'users', email), userData);
        localStorage.setItem('userData', JSON.stringify(userData));
        window.location.href = 'step3.html';
    } catch(err) {
        console.error(err);
        submitBtn.textContent = 'Create Account →'; submitBtn.disabled = false;
        alert('Registration failed. Please check your connection and try again.');
    }
});
</script>
</body>
</html>
