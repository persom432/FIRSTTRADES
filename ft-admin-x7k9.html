<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - FIRSTTRADES</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f1117; color:#fff; min-height:100vh; }
        .admin-wrap { max-width:960px; margin:0 auto; padding:30px 20px; }
        .admin-header { text-align:center; margin-bottom:2rem; }
        .admin-header h1 { font-size:1.8rem; color:#f5c856; font-weight:700; }
        .admin-header p  { color:#6b7280; font-size:0.9rem; margin-top:0.25rem; }
        .login-box { background:#1f2937; border-radius:16px; padding:2rem; max-width:380px; margin:0 auto; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color:#f5c856; text-align:center; margin-bottom:1.25rem; font-size:1.2rem; }
        .login-box input { width:100%; padding:12px 16px; background:#111827; border:2px solid #374151; border-radius:10px; color:#fff; font-size:1rem; margin-bottom:1rem; font-family:inherit; }
        .login-box input:focus { outline:none; border-color:#f5c856; }
        .login-btn { width:100%; padding:13px; background:linear-gradient(135deg,#f5c856,#d4af37); color:#1a1a1a; border:none; border-radius:10px; font-weight:700; font-size:1rem; cursor:pointer; font-family:inherit; }
        .login-btn:hover { opacity:0.9; }
        .login-error { color:#e74c3c; font-size:0.85rem; text-align:center; margin-top:0.5rem; display:none; }
        #dashboard { display:none; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        .top-bar h2 { color:#f5c856; font-size:1.1rem; }
        .logout-btn { background:transparent; border:1px solid #374151; color:#9ca3af; padding:7px 16px; border-radius:8px; cursor:pointer; font-size:0.85rem; font-family:inherit; transition:all 0.2s; }
        .logout-btn:hover { border-color:#e74c3c; color:#e74c3c; }
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
        .stat { background:#1f2937; border-radius:12px; padding:1.25rem; text-align:center; }
        .stat .n { font-size:1.8rem; font-weight:700; color:#f5c856; }
        .stat .l { font-size:0.78rem; color:#9ca3af; margin-top:0.2rem; }
        .tabs { display:flex; gap:0.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
        .tab { padding:7px 18px; border-radius:20px; border:1px solid #374151; background:transparent; color:#9ca3af; cursor:pointer; font-size:0.85rem; font-family:inherit; transition:all 0.2s; }
        .tab.active { background:#f5c856; color:#1a1a1a; border-color:#f5c856; font-weight:600; }
        .deposit-card { background:#1f2937; border-radius:14px; padding:1.25rem 1.5rem; margin-bottom:1rem; border-left:4px solid #f5c856; }
        .deposit-card.approved { border-left-color:#27ae60; }
        .deposit-card.rejected { border-left-color:#e74c3c; opacity:0.6; }
        .card-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:0.75rem; margin-bottom:0.75rem; }
        .card-method { font-weight:700; font-size:1rem; color:#fff; }
        .card-time   { font-size:0.78rem; color:#6b7280; margin-top:0.2rem; }
        .badge { padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; text-transform:uppercase; }
        .badge-pending  { background:rgba(245,200,86,0.15); color:#f5c856; }
        .badge-approved { background:rgba(39,174,96,0.15);  color:#27ae60; }
        .badge-rejected { background:rgba(231,76,60,0.15);  color:#e74c3c; }
        .card-details { background:#111827; border-radius:10px; padding:0.75rem 1rem; margin-bottom:0.75rem; font-size:0.85rem; color:#d1d5db; display:grid; grid-template-columns:1fr 1fr; gap:0.4rem 1rem; }
        .card-details span { color:#9ca3af; }
        .card-details strong { color:#fff; }
        .apple-code { background:#1a1a2e; border:1px dashed #f5c856; border-radius:8px; padding:0.6rem 1rem; font-family:monospace; font-size:1rem; color:#f5c856; letter-spacing:2px; margin-bottom:0.75rem; word-break:break-all; }
        .card-actions { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
        .amt-input { padding:8px 12px; border:2px solid #374151; border-radius:8px; background:#111827; color:#fff; font-size:0.9rem; width:130px; font-family:inherit; }
        .amt-input:focus { outline:none; border-color:#f5c856; }
        .btn-approve { padding:9px 20px; background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff; border:none; border-radius:8px; font-weight:600; font-size:0.85rem; cursor:pointer; font-family:inherit; }
        .btn-reject  { padding:9px 20px; background:linear-gradient(135deg,#e74c3c,#c0392b); color:#fff; border:none; border-radius:8px; font-weight:600; font-size:0.85rem; cursor:pointer; font-family:inherit; }
        .approved-amount { color:#27ae60; font-weight:600; font-size:0.9rem; }
        .empty { text-align:center; color:#6b7280; padding:3rem; font-size:0.95rem; }
        @media(max-width:600px) { .stats { grid-template-columns:1fr 1fr; } .card-details { grid-template-columns:1fr; } }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WR70LQ6B2D"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WR70LQ6B2D');</script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        var fsdb = firebase.firestore();
    </script>
</head>
<body>
<div class="admin-wrap">

    <div class="admin-header">
        <h1>&#9881;&#65039; FIRSTTRADES Admin</h1>
        <p>Deposit Management Panel</p>
    </div>

    <!-- Login -->
    <div class="login-box" id="loginBox">
        <h2>&#128272; Admin Login</h2>
        <input type="password" id="pwInput" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
        <button class="login-btn" onclick="login()">Login</button>
        <div class="login-error" id="loginError">Incorrect password</div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="top-bar">
            <h2>&#128203; Deposit Requests</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="stats">
            <div class="stat"><div class="n" id="sTotal">0</div><div class="l">Total</div></div>
            <div class="stat"><div class="n" id="sPending">0</div><div class="l">Pending</div></div>
            <div class="stat"><div class="n" id="sApproved">0</div><div class="l">Approved</div></div>
            <div class="stat"><div class="n" id="sRejected">0</div><div class="l">Rejected</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="filterDeposits('all', this)">All Deposits</button>
            <button class="tab" onclick="filterDeposits('pending', this)">Pending</button>
            <button class="tab" onclick="filterDeposits('approved', this)">Approved</button>
            <button class="tab" onclick="filterDeposits('rejected', this)">Rejected</button>
            <button class="tab" onclick="showWithdrawals(this)" style="margin-left:auto;">&#128184; Withdrawals</button>
            <button class="tab" onclick="toggleUserPanel(this)">&#128100; Users</button>
        </div>

        <!-- User Management Panel -->
        <div id="userPanel" style="display:none;background:#1f2937;border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #374151;">
            <h3 style="color:#f5c856;margin-bottom:1rem;font-size:1rem;">Set / Override User Credentials</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.75rem;align-items:end;">
                <div>
                    <label style="font-size:0.78rem;color:#9ca3af;display:block;margin-bottom:0.3rem;">Full Name</label>
                    <input id="uName" type="text" placeholder="Full Name" style="width:100%;padding:10px 12px;background:#111827;border:2px solid #374151;border-radius:8px;color:#fff;font-size:0.9rem;font-family:inherit;">
                </div>
                <div>
                    <label style="font-size:0.78rem;color:#9ca3af;display:block;margin-bottom:0.3rem;">Email</label>
                    <input id="uEmail" type="email" placeholder="user@email.com" style="width:100%;padding:10px 12px;background:#111827;border:2px solid #374151;border-radius:8px;color:#fff;font-size:0.9rem;font-family:inherit;">
                </div>
                <div>
                    <label style="font-size:0.78rem;color:#9ca3af;display:block;margin-bottom:0.3rem;">Password</label>
                    <input id="uPass" type="text" placeholder="Password" style="width:100%;padding:10px 12px;background:#111827;border:2px solid #374151;border-radius:8px;color:#fff;font-size:0.9rem;font-family:inherit;">
                </div>
                <button onclick="saveUser()" style="padding:10px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.85rem;font-family:inherit;">Save</button>
            </div>
            <div id="userMsg" style="margin-top:0.75rem;font-size:0.85rem;display:none;"></div>
            <div id="userList" style="margin-top:1rem;"></div>
        </div>

        <div id="depositsList"></div>
        <div id="withdrawalsList" style="display:none;"></div>
    </div>
</div>

<script>
    const ADMIN_HASH = 'a10cccc9020fce9813aade174aaa9949a9e14b762c2f882f8674300aa5f51700';
    var currentFilter = 'all';
    var cloudDeposits = [];

    async function hashPassword(pw) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
        return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }

    function login() {
        var pw = document.getElementById('pwInput').value;
        hashPassword(pw).then(function(hash) {
            if (hash === ADMIN_HASH) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadDeposits();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('pwInput').style.borderColor = '#e74c3c';
            }
        });
    }

    function logout() {
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('pwInput').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    function getDeposits() { return cloudDeposits; }

    function loadDeposits() {
        document.getElementById('depositsList').innerHTML = '<div class="empty">Loading deposits...</div>';
        fsdb.collection('deposits').orderBy('timestamp', 'desc').onSnapshot(function(snap) {
            cloudDeposits = [];
            snap.forEach(function(doc) { cloudDeposits.push(Object.assign({ id: doc.id }, doc.data())); });
            renderDeposits();
        }, function(err) {
            console.warn('Firestore error:', err);
            cloudDeposits = JSON.parse(localStorage.getItem('allDeposits') || '[]');
            renderDeposits();
        });
    }

    function filterDeposits(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('withdrawalsList').style.display = 'none';
        document.getElementById('depositsList').style.display = 'block';
        renderDeposits();
    }

    function renderDeposits() {
        var deposits = getDeposits();
        document.getElementById('sTotal').textContent    = deposits.length;
        document.getElementById('sPending').textContent  = deposits.filter(function(d){ return d.status === 'pending'; }).length;
        document.getElementById('sApproved').textContent = deposits.filter(function(d){ return d.status === 'approved'; }).length;
        document.getElementById('sRejected').textContent = deposits.filter(function(d){ return d.status === 'rejected'; }).length;

        var filtered = currentFilter === 'all' ? deposits : deposits.filter(function(d){ return d.status === currentFilter; });
        var list = document.getElementById('depositsList');

        if (!filtered.length) { list.innerHTML = '<div class="empty">No deposits found.</div>'; return; }

        list.innerHTML = filtered.map(function(d, i) {
            var realIndex = deposits.indexOf(d);
            var date = new Date(d.timestamp).toLocaleString();
            var methodLabel = d.method === 'btc' ? '&#8383; Bitcoin' : d.method === 'eth' ? '&#926; Ethereum' : '&#127822; Apple Gift Card';
            var userInfo = (d.user || d.email) ? '<span>User</span><strong>' + (d.user||'Unknown') + '</strong><span>Email</span><strong>' + (d.email||'-') + '</strong>' : '';
            var amountInfo = d.amount ? '<span>Amount</span><strong style="color:#f5c856;">$' + parseFloat(d.amount).toLocaleString() + '</strong>' : '';
            var appleInfo = (d.method === 'apple' && d.code) ? '<div class="apple-code">Code: ' + d.code + '</div>' : '';
            var proofHtml = d.proofImage ? '<div style="margin-bottom:0.75rem;"><div style="font-size:0.78rem;color:#9ca3af;margin-bottom:0.4rem;">Proof of Payment</div><a href="' + d.proofImage + '" target="_blank"><img src="' + d.proofImage + '" style="max-width:100%;max-height:260px;border-radius:10px;border:1px solid #374151;"></a></div>' : '';
            var actions = d.status === 'pending'
                ? '<div class="card-actions"><input class="amt-input" type="number" id="amt-' + realIndex + '" placeholder="Approve $" min="1" step="0.01"><button class="btn-approve" onclick="approveDeposit(' + realIndex + ')">Approve</button><button class="btn-reject" onclick="rejectDeposit(' + realIndex + ')">Reject</button></div>'
                : '<div class="' + (d.status === 'approved' ? 'approved-amount' : '') + '">' + (d.status === 'approved' ? 'Approved: $' + parseFloat(d.approvedAmount||0).toLocaleString() : 'Rejected') + '</div>';

            return '<div class="deposit-card ' + d.status + '">' +
                '<div class="card-top"><div><div class="card-method">' + methodLabel + '</div><div class="card-time">' + date + '</div></div><span class="badge badge-' + d.status + '">' + d.status + '</span></div>' +
                ((userInfo || amountInfo) ? '<div class="card-details">' + userInfo + amountInfo + '</div>' : '') +
                appleInfo + proofHtml + actions + '</div>';
        }).join('');
    }

    function approveDeposit(index) {
        var amtEl = document.getElementById('amt-' + index);
        var amount = parseFloat(amtEl ? amtEl.value : 0);
        if (!amount || amount <= 0) { if (amtEl) amtEl.style.borderColor = '#e74c3c'; return; }
        var deposit = getDeposits()[index];
        if (!deposit) return;
        var email = deposit.email || '';

        // Update deposit in Firestore
        fsdb.collection('deposits').doc(deposit.id).update({ status: 'approved', approvedAmount: amount })
            .catch(function(e){ console.warn('Deposit update error:', e); });

        if (!email) return;

        // Update user balance in Firestore users collection
        fsdb.collection('users').where('email', '==', email).get().then(function(snap) {
            if (!snap.empty) {
                var userDoc = snap.docs[0];
                var data = userDoc.data();
                var newBal   = (parseFloat(data.balance) || 0) + amount;
                var newTotal = (parseFloat(data.total_deposit) || 0) + amount;
                var update = { balance: newBal, total_deposit: newTotal, allow_withdrawal: newTotal >= 500 };
                if (deposit.signalPlan) update.signalPlan = deposit.signalPlan;
                return userDoc.ref.update(update);
            }
        }).catch(function(e){ console.warn('User update error:', e); });
    }

    function rejectDeposit(index) {
        var deposit = getDeposits()[index];
        if (!deposit) return;
        fsdb.collection('deposits').doc(deposit.id).update({ status: 'rejected' })
            .catch(function(e){ console.warn('Reject error:', e); });
    }

    /* ── Withdrawals ── */
    function getWithdrawals() { return JSON.parse(localStorage.getItem('allWithdrawals') || '[]'); }
    function saveWithdrawals(w) { localStorage.setItem('allWithdrawals', JSON.stringify(w)); }

    function showWithdrawals(btn) {
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('depositsList').style.display = 'none';
        document.getElementById('withdrawalsList').style.display = 'block';
        renderWithdrawals();
    }

    function renderWithdrawals() {
        var list = document.getElementById('withdrawalsList');
        var withdrawals = getWithdrawals();
        if (!withdrawals.length) { list.innerHTML = '<div class="empty">No withdrawal requests yet.</div>'; return; }
        list.innerHTML = '<h3 style="color:#f5c856;margin-bottom:1rem;">Withdrawal Requests</h3>' +
            withdrawals.slice().reverse().map(function(w, ri) {
                var realIndex = withdrawals.length - 1 - ri;
                var date = new Date(w.timestamp).toLocaleString();
                var methodLabel = w.method === 'btc' ? 'Bitcoin' : w.method === 'eth' ? 'Ethereum' : 'Bank Transfer';
                var actions = w.status === 'pending'
                    ? '<div class="card-actions" style="margin-top:0.75rem;"><button class="btn-approve" onclick="approveWithdrawal(' + realIndex + ')">Approve</button><button class="btn-reject" onclick="rejectWithdrawal(' + realIndex + ')">Reject</button></div>'
                    : '<div style="margin-top:0.75rem;font-weight:600;color:' + (w.status==='approved'?'#27ae60':'#e74c3c') + ';">' + (w.status==='approved'?'Approved':'Rejected') + '</div>';
                return '<div class="deposit-card ' + w.status + '"><div class="card-top"><div><div class="card-method">' + methodLabel + '</div><div class="card-time">' + date + '</div></div><span class="badge badge-' + w.status + '">' + w.status + '</span></div><div class="card-details"><span>User</span><strong>' + w.user + '</strong><span>Email</span><strong>' + w.email + '</strong><span>Amount</span><strong style="color:#f5c856;">$' + parseFloat(w.amount).toLocaleString() + '</strong><span>Address</span><strong style="word-break:break-all;">' + w.address + '</strong></div>' + actions + '</div>';
            }).join('');
    }

    function approveWithdrawal(index) {
        var withdrawals = getWithdrawals();
        withdrawals[index].status = 'approved';
        saveWithdrawals(withdrawals);
        renderWithdrawals();
    }

    function rejectWithdrawal(index) {
        var withdrawals = getWithdrawals();
        withdrawals[index].status = 'rejected';
        saveWithdrawals(withdrawals);
        renderWithdrawals();
    }

    /* ── User Management ── */
    function toggleUserPanel(btn) {
        var panel = document.getElementById('userPanel');
        var visible = panel.style.display !== 'none';
        panel.style.display = visible ? 'none' : 'block';
        if (!visible) renderUserList();
    }

    function getUsers() { return JSON.parse(localStorage.getItem('allUsers') || '[]'); }
    function saveUsers(u) { localStorage.setItem('allUsers', JSON.stringify(u)); }

    function saveUser() {
        var name  = document.getElementById('uName').value.trim();
        var email = document.getElementById('uEmail').value.trim().toLowerCase();
        var pass  = document.getElementById('uPass').value.trim();
        var msg   = document.getElementById('userMsg');
        if (!email || !pass) { msg.style.color='#e74c3c'; msg.textContent='Email and password are required.'; msg.style.display='block'; return; }
        var users = getUsers();
        var idx = users.findIndex(function(u){ return u.email === email; });
        var userData = { fullName: name||email, email: email, password: pass, balance: 0, total_deposit: 0, allow_withdrawal: false };
        if (idx >= 0) { users[idx] = Object.assign(users[idx], userData); } else { users.push(userData); }
        saveUsers(users);

        // Also save to Firestore so login works cross-device
        fsdb.collection('users').doc(email).set(userData, { merge: true });

        msg.style.color='#27ae60'; msg.textContent='User saved: ' + email; msg.style.display='block';
        document.getElementById('uName').value=''; document.getElementById('uEmail').value=''; document.getElementById('uPass').value='';
        renderUserList();
    }

    function deleteUser(email) {
        saveUsers(getUsers().filter(function(u){ return u.email !== email; }));
        renderUserList();
    }

    function renderUserList() {
        var users = getUsers();
        var el = document.getElementById('userList');
        if (!users.length) { el.innerHTML='<p style="color:#6b7280;font-size:0.85rem;">No users saved yet.</p>'; return; }
        el.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;"><thead><tr style="border-bottom:1px solid #374151;"><th style="padding:6px;text-align:left;color:#9ca3af;">Name</th><th style="padding:6px;text-align:left;color:#9ca3af;">Email</th><th style="padding:6px;text-align:left;color:#9ca3af;">Password</th><th></th></tr></thead><tbody>' +
            users.map(function(u){
                return '<tr style="border-bottom:1px solid #1f2937;"><td style="padding:6px;color:#fff;">' + u.fullName + '</td><td style="padding:6px;color:#f5c856;">' + u.email + '</td><td style="padding:6px;color:#9ca3af;">' + u.password + '</td><td style="padding:6px;"><button onclick="deleteUser(\'' + u.email + '\')" style="background:none;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:0.78rem;">Delete</button></td></tr>';
            }).join('') + '</tbody></table>';
    }
</script>
</body>
</html>
