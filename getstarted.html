<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Account Type - FIRSTTRADES</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:80px 20px 40px; }
        .auth-logo { font-size:1.3rem; font-weight:800; color:#fff; margin-bottom:0.5rem; text-align:center; }
        .auth-logo span { color:#00b386; }
        .page-title { font-size:1.6rem; font-weight:800; color:#fff; text-align:center; margin-bottom:0.4rem; letter-spacing:-0.5px; }
        .page-sub { color:#8a94a6; font-size:0.88rem; text-align:center; margin-bottom:2rem; }
        .options-container { width:100%; max-width:440px; display:flex; flex-direction:column; gap:1rem; }
        .account-option {
            background:#111827; border:1.5px solid rgba(255,255,255,0.08);
            border-radius:12px; padding:1.25rem 1.5rem;
            cursor:pointer; transition:all 0.2s;
            display:flex; align-items:center; gap:1rem;
            text-decoration:none; color:inherit;
        }
        .account-option:hover { border-color:rgba(0,179,134,0.4); background:#1a2235; transform:translateY(-2px); }
        .account-option.tapped { border-color:#00b386; background:rgba(0,179,134,0.08); }
        .option-icon {
            width:48px; height:48px; background:rgba(0,179,134,0.1);
            border-radius:10px; display:flex; align-items:center;
            justify-content:center; font-size:1.4rem; flex-shrink:0;
        }
        .option-text { flex:1; }
        .option-text h3 { font-size:0.95rem; font-weight:700; color:#fff; margin-bottom:0.25rem; }
        .option-text p  { font-size:0.8rem; color:#8a94a6; line-height:1.5; }
        .option-arrow svg { width:16px; height:16px; fill:none; stroke:#8a94a6; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
        .back-link { margin-top:1.5rem; color:#8a94a6; font-size:0.82rem; text-decoration:none; }
        .back-link:hover { color:#00b386; }
    </style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WR70LQ6B2D"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WR70LQ6B2D');</script>
</head>
<body>
    <div class="auth-logo">FIRST<span>TRADES</span></div>
    <div class="page-title">Choose Account Type</div>
    <p class="page-sub">Select the account type that best fits your needs</p>

    <div class="options-container">
        <div class="account-option" data-type="individual">
            <div class="option-icon">👤</div>
            <div class="option-text">
                <h3>Individual Account</h3>
                <p>For personal investors seeking direct market access with real-time analytics.</p>
            </div>
            <div class="option-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="account-option" data-type="business">
            <div class="option-icon">🏢</div>
            <div class="option-text">
                <h3>Business Account</h3>
                <p>For businesses and institutions needing advanced trading infrastructure.</p>
            </div>
            <div class="option-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Back to home</a>

    <script>
        document.querySelectorAll('.account-option').forEach(function(option) {
            option.addEventListener('click', function() {
                localStorage.setItem('selectedAccountType', this.getAttribute('data-type'));
                this.classList.add('tapped');
                setTimeout(function() { window.location.href = 'step2.html'; }, 200);
            });
        });
    </script>
</body>
</html>
